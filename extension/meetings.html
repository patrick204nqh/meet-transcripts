<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meet Transcripts — Meetings</title>
  <style>
    :root {
      --brand:        #38bdf8;
      --brand-dim:    rgba(56, 189, 248, 0.12);
      --brand-border: rgba(56, 189, 248, 0.3);
      --text:         #f1f5f9;
      --text-2:       #94a3b8;
      --text-3:       #64748b;
      --glass:        rgba(255, 255, 255, 0.05);
      --glass-hover:  rgba(255, 255, 255, 0.08);
      --glass-border: rgba(255, 255, 255, 0.1);
      --border:       rgba(255, 255, 255, 0.08);
      --success:      #34d399;
      --success-bg:   rgba(52, 211, 153, 0.12);
      --error:        #f87171;
      --error-bg:     rgba(248, 113, 113, 0.12);
      --warning:      #fbbf24;
      --warning-bg:   rgba(251, 191, 36, 0.12);
      --r-sm:         8px;
      --r:            12px;
      --r-lg:         16px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: var(--text);
      background:
        radial-gradient(ellipse at 20% 10%, rgba(30, 58, 138, 0.35) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(56, 189, 248, 0.10) 0%, transparent 50%),
        linear-gradient(145deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
      background-attachment: fixed;
      min-height: 100vh;
      font-size: 1rem;
      line-height: 1.6;
      accent-color: var(--brand);
      margin: 0;
    }

    p { margin: 0; }

    a {
      color: var(--brand);
      font-weight: 600;
      text-underline-offset: 3px;
      text-decoration-color: var(--brand-border);
    }
    a:hover { text-decoration-color: var(--brand); }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(56, 189, 248, 0.3); border-radius: 99px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--brand); }

    /* ── Page nav ── */
    .page-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.875rem 2rem;
      border-bottom: 1px solid var(--border);
      background: rgba(15, 23, 42, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .page-nav h1 {
      margin: 0;
      font-size: 1.125rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #bae6fd 0%, #38bdf8 55%, #0284c7 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .nav-link {
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--text-2);
      text-decoration: none;
      padding: 0.35rem 0.75rem;
      border-radius: var(--r-sm);
      border: 1px solid var(--glass-border);
      background: var(--glass);
      transition: color 0.15s, background 0.15s, border-color 0.15s;
      white-space: nowrap;
    }

    .nav-link:hover {
      color: var(--text);
      background: var(--glass-hover);
      border-color: rgba(255, 255, 255, 0.18);
      text-decoration: none;
    }

    /* ── Main content ── */
    main {
      margin: 0 auto;
      max-width: 1200px;
      padding: 2rem 2rem 4rem;
    }

    section { margin-bottom: 3rem; }

    .sub-text {
      color: var(--text-2);
      font-size: 0.875rem;
    }

    h2 {
      margin: 0 0 0.25rem;
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text);
    }

    /* ── Section header ── */
    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.5rem;
    }

    /* ── Recover button ── */
    #recover-last-meeting {
      background: var(--glass);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      color: var(--brand);
      border: 1px solid var(--brand-border);
      border-radius: var(--r-sm);
      padding: 0.3rem 0.75rem;
      font-size: 0.8125rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    #recover-last-meeting:hover {
      background: var(--brand-dim);
      border-color: var(--brand);
    }

    /* ── Table ── */
    #meetings-table-container { overflow-x: auto; }

    table {
      width: 100%;
      border-collapse: collapse;
      border: 1px solid var(--glass-border);
      border-radius: var(--r);
      overflow: hidden;
      background: var(--glass);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    th, td {
      padding: 0.875rem 1.25rem;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }

    th {
      background: rgba(30, 58, 138, 0.25);
      font-size: 0.8125rem;
      font-weight: 600;
      color: var(--text-2);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    tbody tr:last-child td { border-bottom: none; }
    tbody tr { transition: background 0.1s; }
    tbody tr:hover { background: var(--glass-hover); }

    .meeting-title {
      border-radius: var(--r-sm);
      padding: 0.2rem 0.4rem;
      text-decoration: underline;
      text-decoration-color: var(--text-3);
      text-underline-offset: 4px;
      color: var(--text);
      outline: none;
      transition: background 0.15s;
    }

    .meeting-title:hover {
      background: var(--glass-hover);
      text-decoration: none;
    }

    .meeting-title:focus {
      background: var(--glass-hover);
      text-decoration: none;
      outline: 1px solid var(--brand-border);
    }

    /* ── Status badges ── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.2rem 0.6rem;
      border-radius: 100px;
      font-size: 0.75rem;
      font-weight: 600;
      white-space: nowrap;
    }

    .badge::before {
      content: '';
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
    }

    .status-success { color: var(--success); background: var(--success-bg); }
    .status-failed  { color: var(--error);   background: var(--error-bg); }
    .status-new     { color: var(--warning);  background: var(--warning-bg); }

    /* ── Action buttons ── */
    .download-button,
    .delete-button,
    .post-button {
      background: transparent;
      color: var(--text-2);
      border: none;
      padding: 0.3rem;
      border-radius: var(--r-sm);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, color 0.15s;
    }

    .download-button:hover, .post-button:hover {
      background: var(--brand-dim);
      color: var(--brand);
    }

    .delete-button:hover {
      background: var(--error-bg);
      color: var(--error);
    }

    /* ── Show all button ── */
    #show-all {
      display: block;
      margin: 0.75rem auto 0;
      border-radius: 100px;
      background: var(--glass);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      color: var(--brand);
      border: 1px solid var(--brand-border);
      padding: 0.3rem 1rem;
      font-size: 0.8125rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    #show-all:hover {
      background: var(--brand-dim);
      border-color: var(--brand);
    }

    .fade-mask {
      mask-image: linear-gradient(to bottom, black 0%, black 80%, transparent 100%);
      -webkit-mask-image: linear-gradient(to bottom, black 0%, black 80%, transparent 100%);
      max-height: 20rem;
      overflow-y: hidden;
    }

    /* ── Toasts ── */
    #toast-container {
      position: fixed;
      top: 1.25rem;
      right: 1.25rem;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      pointer-events: none;
    }

    .toast {
      padding: 0.75rem 1rem;
      border-radius: var(--r);
      font-size: 0.875rem;
      font-weight: 500;
      max-width: 320px;
      pointer-events: auto;
      animation: toast-in 0.2s ease;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
    }

    @keyframes toast-in {
      from { opacity: 0; transform: translateX(0.75rem); }
      to   { opacity: 1; transform: none; }
    }

    @media (prefers-reduced-motion: reduce) {
      .toast { animation: none; }
    }

    .toast-success { background: var(--success-bg); color: var(--success); border: 1px solid rgba(52, 211, 153, 0.3); }
    .toast-error   { background: var(--error-bg);   color: var(--error);   border: 1px solid rgba(248, 113, 113, 0.3); }
    .toast-info    { background: var(--brand-dim);  color: var(--brand);   border: 1px solid var(--brand-border); }
    .toast-confirm { background: var(--glass); color: var(--text); border: 1px solid var(--glass-border); }

    .toast-confirm-actions {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.625rem;
    }

    .toast-confirm-actions button {
      padding: 0.3rem 0.75rem;
      border-radius: var(--r-sm);
      font-size: 0.8125rem;
      font-weight: 600;
      cursor: pointer;
    }

    .toast-confirm-yes { background: var(--error); color: #0d0d1a; border: none; }
    .toast-confirm-no  { background: var(--glass); color: var(--text-2); border: 1px solid var(--glass-border); }
  </style>
</head>

<body>
  <nav class="page-nav">
    <h1>Meet Transcripts</h1>
    <a href="settings.html" class="nav-link" target="_blank">Settings</a>
  </nav>

  <main>
    <section id="last-10-meetings" aria-labelledby="meetings-heading">
      <div class="section-header">
        <div>
          <h2 id="meetings-heading">Last 10 meetings</h2>
          <p class="sub-text" style="margin-top: 0.2rem;">Only the last 10 meetings are stored. Download or post to a webhook to keep older ones.</p>
        </div>
        <button id="recover-last-meeting">Recover last meeting</button>
      </div>

      <div id="meetings-table-container" style="margin-top: 1rem;">
        <table>
          <thead>
            <tr>
              <th>Meeting title</th>
              <th>Meeting software</th>
              <th>Meeting start time and duration</th>
              <th>Webhook status</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="meetings-table">
            <!-- Populated by JavaScript -->
          </tbody>
        </table>
      </div>
      <button id="show-all" style="display: none;">Show all</button>
    </section>
  </main>

  <div id="toast-container" role="region" aria-live="polite" aria-label="Notifications"></div>
  <script src="meetings.js"></script>
</body>

</html>
